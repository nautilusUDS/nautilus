name: Nautilus CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # --- Phase 1: Go Backend Testing ---
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Run Unit Tests
        run: go test -v ./internal/...

  # --- Phase 3: Docker Integration Testing ---
  integration-tests:
    name: Docker Integration Suite
    runs-on: ubuntu-latest
    needs: [go-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run Full Integration Suite
        run: |
          chmod +x ./test/run_tests.sh
          ./test/run_tests.sh
