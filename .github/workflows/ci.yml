name: Nautilus CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # --- Phase 1: Go Backend Testing ---
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Run Unit Tests
        run: go test -v ./internal/...

  # --- Phase 2: Rust Relay Testing ---
  rust-tests:
    name: Rust Relay Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rust Check (Format)
        run: cd relay && cargo fmt --check
      - name: Rust Check (Clippy)
        run: cd relay && cargo clippy -- -D warnings
      - name: Run Relay Tests
        run: cd relay && cargo test

  # --- Phase 3: Docker Integration Testing ---
  integration-tests:
    name: Docker Integration Suite
    runs-on: ubuntu-latest
    needs: [go-tests, rust-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run Full Integration Suite
        run: |
          chmod +x ./test/run_tests.sh
          ./test/run_tests.sh

  # --- Phase 4: Publish to Docker Hub (On Tag Only) ---
  publish:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata (Nautilus)
        id: meta-nautilus
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nautilus
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Extract Metadata (Relay)
        id: meta-relay
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nautilus-relay
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and Push Nautilus
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta-nautilus.outputs.tags }}
          labels: ${{ steps.meta-nautilus.outputs.labels }}

      - name: Build and Push Relay
        uses: docker/build-push-action@v5
        with:
          context: ./relay
          file: ./relay/docker/Dockerfile
          push: true
          tags: ${{ steps.meta-relay.outputs.tags }}
          labels: ${{ steps.meta-relay.outputs.labels }}
