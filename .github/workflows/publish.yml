name: Publish Nautilus

on:
  push:
    tags:
      - 'v*'

jobs:
  # We re-run tests on the tagged commit to ensure absolute integrity before publishing
  validate:
    name: Validate Tagged Commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run Unit Tests
        run: go test -v ./internal/...

      - name: Run Integration Suite
        run: |
          chmod +x ./test/run_tests.sh
          ./test/run_tests.sh

  publish:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata (Nautilus)
        id: meta-nautilus
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nautilus
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and Push Nautilus
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta-nautilus.outputs.tags }}
          labels: ${{ steps.meta-nautilus.outputs.labels }}
