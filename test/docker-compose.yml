services:
  nginx:
    image: nginx:latest

  ntl-tentacle:
    image: lucap9056/nautilus-relay:1.0.0
    network_mode: "service:nginx"
    volumes:
      - proxy_volume:/var/run/nautilus
    environment:
      NAUTILUS_SERVICE_NAME: nginx
      NAUTILUS_TARGET_ADDR: localhost:80
      NAUTILUS_SOCKET_NAME: node-1.sock
      NAUTILUS_SERVICES_DIR: /var/run/nautilus/services

  nautilus:
    image: lucap9056/nautilus:1.0.0
    volumes:
      - proxy_volume:/var/run/nautilus
      - ./config:/nautilus/config/
    environment:
      NAUTILUS_CONFIG: /nautilus/config/Ntlfile
      NAUTILUS_ENTRYPOINT_DIR: /var/run/nautilus
      NAUTILUS_ENTRYPOINT_COUNT: 3
      NAUTILUS_SERVICES_DIR: /var/run/nautilus/services

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
    volumes:
      - proxy_volume:/var/run/nautilus
    command: caddy reverse-proxy --from :80 --to unix//var/run/nautilus/nautilus-0.sock --to unix//var/run/nautilus/nautilus-1.sock --to unix//var/run/nautilus/nautilus-2.sock
    depends_on:
      - nautilus
    

volumes:
  proxy_volume:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
      o: "size=10m,uid=1000"