services:
  backend:
    image: caddy:latest
    volumes:
      - proxy_volume:/var/run/nautilus
      - ./Caddyfile.backend:/etc/caddy/Caddyfile
    user: "1000:1000"
    # Ensure the service directory exists before Caddy tries to bind the socket
    command: sh -c "mkdir -p /var/run/nautilus/services/backend && caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"

  nautilus:
    build:
      context: ..
      dockerfile: test/Dockerfile.nautilus-dev
    volumes:
      - ..:/app
      - proxy_volume:/var/run/nautilus
      - ./config:/nautilus/config/
    environment:
      NAUTILUS_CONFIG: /nautilus/config/Ntlfile
      NAUTILUS_ENTRYPOINT_DIR: /var/run/nautilus
      NAUTILUS_ENTRYPOINT_COUNT: 3
      NAUTILUS_SERVICES_DIR: /var/run/nautilus/services
    depends_on:
      backend:
        condition: service_started

  caddy:
    image: caddy:latest
    ports:
      - "8080:80"
    volumes:
      - proxy_volume:/var/run/nautilus
      - ./Caddyfile.frontend:/etc/caddy/Caddyfile
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    depends_on:
      nautilus:
        condition: service_started

volumes:
  proxy_volume:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"
      o: "size=10m,uid=1000"
